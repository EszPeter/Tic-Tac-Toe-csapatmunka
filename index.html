<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="container">
        <h1>Tic-Tac-Toe</h1>
        
        <div class="scoreboard">
            <p>X: <span id="scoreX">0</span> | O: <span id="scoreO">0</span></p>
        </div>

        <h2 id="status">X jön</h2>

        <div class="board">
            <div class="cell" id="c0" onclick="kattintas(0)"></div>
            <div class="cell" id="c1" onclick="kattintas(1)"></div>
            <div class="cell" id="c2" onclick="kattintas(2)"></div>
            <div class="cell" id="c3" onclick="kattintas(3)"></div>
            <div class="cell" id="c4" onclick="kattintas(4)"></div>
            <div class="cell" id="c5" onclick="kattintas(5)"></div>
            <div class="cell" id="c6" onclick="kattintas(6)"></div>
            <div class="cell" id="c7" onclick="kattintas(7)"></div>
            <div class="cell" id="c8" onclick="kattintas(8)"></div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
